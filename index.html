<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google-adsense-account" content="ca-pub-8468811206307354">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8468811206307354" crossorigin="anonymous"></script>
    <title>아룡의 포털</title>
    <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@400;700&family=Orbitron:wght@700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-cyan: #00f5ff;
            --neon-pink: #ff006e;
            --neon-yellow: #ffe600;
            --dark-bg: #050510;
            --card-bg: rgba(10, 10, 40, 0.85);
            --glow-cyan: 0 0 20px #00f5ff, 0 0 60px #00f5ff55;
            --glow-pink: 0 0 20px #ff006e, 0 0 60px #ff006e55;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--dark-bg);
            color: #fff;
            font-family: 'Noto Sans KR', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Starfield background */
        #stars-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        /* Scanline overlay */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0,0,0,0.07) 2px,
                rgba(0,0,0,0.07) 4px
            );
            pointer-events: none;
            z-index: 1;
        }

        .container {
            position: relative;
            z-index: 2;
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px 80px;
        }

        /* Lang toggle */
        .lang-toggle {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 20px;
        }

        .lang-btn {
            background: transparent;
            border: 1px solid var(--neon-cyan);
            color: var(--neon-cyan);
            font-family: 'Share Tech Mono', monospace;
            font-size: 13px;
            padding: 6px 18px;
            cursor: pointer;
            letter-spacing: 2px;
            border-radius: 2px;
            transition: all 0.2s;
            text-transform: uppercase;
        }

        .lang-btn:hover {
            background: var(--neon-cyan);
            color: var(--dark-bg);
            box-shadow: var(--glow-cyan);
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 60px;
        }

        .header-label {
            font-family: 'Share Tech Mono', monospace;
            font-size: 12px;
            letter-spacing: 6px;
            color: var(--neon-cyan);
            text-transform: uppercase;
            margin-bottom: 14px;
            opacity: 0;
            animation: fadeSlideDown 0.7s 0.2s forwards;
        }

        .header h1 {
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: clamp(2rem, 7vw, 4.2rem);
            line-height: 1.1;
            letter-spacing: -1px;
            background: linear-gradient(135deg, var(--neon-cyan) 0%, #fff 45%, var(--neon-pink) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            opacity: 0;
            animation: fadeSlideDown 0.7s 0.4s forwards;
            text-shadow: none;
            filter: drop-shadow(0 0 30px #00f5ff88);
        }

        .header h1 .kr-name {
            font-family: 'Black Han Sans', sans-serif;
            display: block;
            font-size: clamp(1.2rem, 4vw, 2.2rem);
            margin-top: 8px;
            background: linear-gradient(90deg, var(--neon-yellow), var(--neon-pink));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 12px #ffe60088);
        }

        .header-sub {
            margin-top: 18px;
            font-size: 15px;
            color: rgba(255,255,255,0.5);
            letter-spacing: 1px;
            opacity: 0;
            animation: fadeSlideDown 0.7s 0.6s forwards;
        }

        /* Divider */
        .divider {
            display: flex;
            align-items: center;
            gap: 14px;
            margin: 0 auto 50px;
            max-width: 500px;
            opacity: 0;
            animation: fadeIn 0.8s 0.8s forwards;
        }
        .divider-line {
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--neon-cyan), transparent);
        }
        .divider-diamond {
            width: 8px; height: 8px;
            background: var(--neon-cyan);
            transform: rotate(45deg);
            box-shadow: var(--glow-cyan);
        }

        /* Game grid */
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 28px;
        }

        .game-card {
            position: relative;
            background: var(--card-bg);
            border: 1px solid rgba(0, 245, 255, 0.2);
            border-radius: 4px;
            padding: 36px 28px 28px;
            text-decoration: none;
            color: inherit;
            display: block;
            transition: transform 0.3s, border-color 0.3s;
            overflow: hidden;
            opacity: 0;
            animation: fadeSlideUp 0.6s forwards;
        }

        .game-card:nth-child(1) { animation-delay: 0.9s; }
        .game-card:nth-child(2) { animation-delay: 1.1s; }

        .game-card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(0,245,255,0.04) 0%, transparent 60%);
            pointer-events: none;
        }

        .game-card::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--neon-cyan), transparent);
            transition: opacity 0.3s;
        }

        .game-card:nth-child(2)::after {
            background: linear-gradient(90deg, transparent, var(--neon-pink), transparent);
        }

        .game-card:hover {
            transform: translateY(-6px);
            border-color: rgba(0,245,255,0.5);
            box-shadow: 0 20px 60px rgba(0,245,255,0.12);
        }

        .game-card:nth-child(2):hover {
            border-color: rgba(255,0,110,0.5);
            box-shadow: 0 20px 60px rgba(255,0,110,0.12);
        }

        .card-tag {
            font-family: 'Share Tech Mono', monospace;
            font-size: 10px;
            letter-spacing: 3px;
            color: var(--neon-cyan);
            text-transform: uppercase;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .game-card:nth-child(2) .card-tag { color: var(--neon-pink); }

        .card-tag::before {
            content: '';
            display: inline-block;
            width: 20px; height: 1px;
            background: currentColor;
        }

        .card-icon {
            font-size: 52px;
            margin-bottom: 18px;
            display: block;
            filter: drop-shadow(0 0 12px rgba(0,245,255,0.5));
            transition: transform 0.3s;
        }

        .game-card:nth-child(2) .card-icon {
            filter: drop-shadow(0 0 12px rgba(255,0,110,0.5));
        }

        .game-card:hover .card-icon { transform: scale(1.1) rotate(-3deg); }

        .card-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 6px;
            color: #fff;
        }

        .card-title-kr {
            font-family: 'Black Han Sans', sans-serif;
            font-size: 1rem;
            color: rgba(255,255,255,0.45);
            margin-bottom: 14px;
            letter-spacing: 1px;
        }

        .card-desc {
            font-size: 13.5px;
            line-height: 1.7;
            color: rgba(255,255,255,0.55);
            margin-bottom: 24px;
        }

        .card-cta {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 12px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--neon-cyan);
            transition: gap 0.2s;
        }

        .game-card:nth-child(2) .card-cta { color: var(--neon-pink); }

        .game-card:hover .card-cta { gap: 16px; }

        .card-cta-arrow {
            font-size: 18px;
            transition: transform 0.2s;
        }

        .game-card:hover .card-cta-arrow { transform: translateX(4px); }

        /* Corner decorations */
        .corner {
            position: absolute;
            width: 16px; height: 16px;
            border-color: var(--neon-cyan);
            border-style: solid;
            opacity: 0.5;
        }
        .game-card:nth-child(2) .corner { border-color: var(--neon-pink); }
        .corner.tl { top: 8px; left: 8px; border-width: 1px 0 0 1px; }
        .corner.br { bottom: 8px; right: 8px; border-width: 0 1px 1px 0; }

        /* Footer */
        .footer {
            text-align: center;
            margin-top: 70px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 11px;
            letter-spacing: 3px;
            color: rgba(255,255,255,0.2);
            text-transform: uppercase;
            opacity: 0;
            animation: fadeIn 1s 1.5s forwards;
        }

        /* Pulse dot */
        .pulse-dot {
            display: inline-block;
            width: 6px; height: 6px;
            background: var(--neon-cyan);
            border-radius: 50%;
            margin-right: 8px;
            animation: pulse 2s infinite;
            box-shadow: var(--glow-cyan);
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(0.7); }
        }

        @keyframes fadeSlideDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>
<canvas id="stars-canvas"></canvas>

<div class="container">
    <div class="lang-toggle">
        <button class="lang-btn" id="langBtn" onclick="toggleLang()">🌐 English</button>
    </div>

    <header class="header">
        <div class="header-label" id="label">// arong's space v2.0</div>
        <h1>
            ARONG'S HUB
            <span class="kr-name" id="mainTitle">아룡의 포털</span>
        </h1>
        <p class="header-sub" id="subTitle">
            <span class="pulse-dot"></span>
            <span id="subText">게임, 툴, 그리고 그 이상 — 아룡의 세계에 오신 것을 환영합니다</span>
        </p>
    </header>

    <div class="divider">
        <div class="divider-line"></div>
        <div class="divider-diamond"></div>
        <div class="divider-line"></div>
    </div>

    <div class="games-grid">
        <a class="game-card" href="https://arongspro.github.io/Game-Platformer/" target="_blank">
            <div class="corner tl"></div>
            <div class="corner br"></div>
            <div class="card-tag" id="tag1">액션 / 3D</div>
            <span class="card-icon">🎮</span>
            <div class="card-title">3D PLATFORMER</div>
            <div class="card-title-kr" id="cardTitle1">3D 플랫포머 게임</div>
            <p class="card-desc" id="cardDesc1">
                짜릿한 3D 플랫포머 세계로 뛰어드세요. 점프하고, 달리고, 장애물을 피하며 스테이지를 클리어하세요!
            </p>
            <span class="card-cta">
                <span id="ctaText1">지금 플레이</span>
                <span class="card-cta-arrow">→</span>
            </span>
        </a>

        <a class="game-card" href="https://arongspro.github.io/chess" target="_blank">
            <div class="corner tl"></div>
            <div class="corner br"></div>
            <div class="card-tag" id="tag2">전략 / 보드</div>
            <span class="card-icon">♟️</span>
            <div class="card-title">CHESS</div>
            <div class="card-title-kr" id="cardTitle2">체스</div>
            <p class="card-desc" id="cardDesc2">
                클래식 체스의 세계로 입장하세요. 전략을 세우고 상대를 제압하는 두뇌 싸움을 즐겨보세요!
            </p>
            <span class="card-cta">
                <span id="ctaText2">지금 플레이</span>
                <span class="card-cta-arrow">→</span>
            </span>
        </a>
    </div>

    <div class="footer" id="footer">
        <span>© arong's hub · Made with ❤️</span>
    </div>
</div>

<script>
// Starfield
const canvas = document.getElementById('stars-canvas');
const ctx = canvas.getContext('2d');
let stars = [];

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}

function initStars() {
    stars = [];
    for (let i = 0; i < 180; i++) {
        stars.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            r: Math.random() * 1.4 + 0.2,
            speed: Math.random() * 0.3 + 0.05,
            alpha: Math.random()
        });
    }
}

function drawStars() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for (let s of stars) {
        s.alpha += (Math.random() - 0.5) * 0.04;
        s.alpha = Math.max(0.05, Math.min(1, s.alpha));
        s.y += s.speed;
        if (s.y > canvas.height) { s.y = 0; s.x = Math.random() * canvas.width; }
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(180,220,255,${s.alpha})`;
        ctx.fill();
    }
    requestAnimationFrame(drawStars);
}

resize();
initStars();
drawStars();
window.addEventListener('resize', () => { resize(); initStars(); });

// Language toggle
let isKorean = true;

const text = {
    ko: {
        btnText: '🌐 English',
        label: '// arong\'s space v2.0',
        mainTitle: '아룡의 포털',
        subText: '게임, 툴, 그리고 그 이상 — 아룡의 세계에 오신 것을 환영합니다',
        tag1: '액션 / 3D',
        cardTitle1: '3D 플랫포머 게임',
        cardDesc1: '짜릿한 3D 플랫포머 세계로 뛰어드세요. 점프하고, 달리고, 장애물을 피하며 스테이지를 클리어하세요!',
        ctaText1: '지금 플레이',
        tag2: '전략 / 보드',
        cardTitle2: '체스',
        cardDesc2: '클래식 체스의 세계로 입장하세요. 전략을 세우고 상대를 제압하는 두뇌 싸움을 즐겨보세요!',
        ctaText2: '지금 플레이',
        footer: '© arong\'s hub · Made with ❤️',
        pageTitle: '아룡의 포털'
    },
    en: {
        btnText: '🌐 한국어',
        label: '// arong\'s space v2.0',
        mainTitle: "arong's portal",
        subText: 'Games, tools, and more — welcome to arong\'s world',
        tag1: 'Action / 3D',
        cardTitle1: '3D Platformer Game',
        cardDesc1: 'Dive into a thrilling 3D platformer world. Jump, run, dodge obstacles and clear every stage!',
        ctaText1: 'Play Now',
        tag2: 'Strategy / Board',
        cardTitle2: 'Chess',
        cardDesc2: 'Enter the classic world of chess. Plan your moves, outthink your opponent, and seize victory!',
        ctaText2: 'Play Now',
        footer: "© arong's hub · Made with ❤️",
        pageTitle: "arong's portal"
    }
};

function toggleLang() {
    isKorean = !isKorean;
    const lang = isKorean ? 'ko' : 'en';
    const t = text[lang];
    document.getElementById('langBtn').textContent = t.btnText;
    document.getElementById('label').textContent = t.label;
    document.getElementById('mainTitle').textContent = t.mainTitle;
    document.getElementById('subText').textContent = t.subText;
    document.getElementById('tag1').textContent = t.tag1;
    document.getElementById('cardTitle1').textContent = t.cardTitle1;
    document.getElementById('cardDesc1').textContent = t.cardDesc1;
    document.getElementById('ctaText1').textContent = t.ctaText1;
    document.getElementById('tag2').textContent = t.tag2;
    document.getElementById('cardTitle2').textContent = t.cardTitle2;
    document.getElementById('cardDesc2').textContent = t.cardDesc2;
    document.getElementById('ctaText2').textContent = t.ctaText2;
    document.getElementById('footer').innerHTML = `<span>${t.footer}</span>`;
    document.title = t.pageTitle;
    document.documentElement.lang = lang;
}
</script>
</body>
</html>
